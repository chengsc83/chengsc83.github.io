        <!-- 教學引導 (Onboarding Tour) - 增強版 -->
        <div id="onboarding-overlay" class="onboarding-overlay">
            <div class="backdrop"></div>
            <div id="onboarding-highlight" class="onboarding-highlight"></div>
            <div id="onboarding-tooltip" class="onboarding-tooltip">
                <!-- 章節標題 -->
                <div class="chapter-header" id="tour-chapter-header">
                    <span class="chapter-icon" id="tour-chapter-icon">👋</span>
                    <span class="chapter-title" id="tour-chapter-title">歡迎使用辯時計</span>
                </div>
                <!-- 步驟徽章 -->
                <span class="step-badge" id="tour-step-badge">步驟 1 / 10</span>
                <h4 id="tour-title">歡迎使用辯時計</h4>
                <p id="tour-description">讓我們快速了解一下主要功能。</p>
                <!-- 快捷鍵提示 -->
                <div class="keyboard-hint" id="tour-keyboard-hint">
                    <span>按 <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>Enter</kbd> 導航</span>
                </div>
                <div class="actions">
                    <button class="btn-skip" id="tour-skip">跳過教學</button>
                    <div class="nav-buttons">
                        <button class="btn-prev" id="tour-prev">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg>
                            上一步
                        </button>
                        <button class="btn-next" id="tour-next">
                            下一步
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- 章節進度指示器 -->
                <div class="chapter-progress" id="tour-chapter-progress"></div>
                <div class="progress-dots" id="tour-progress"></div>
            </div>
        </div>

        <audio id="ringSound" preload="auto" src="ring.m4a"></audio>
        <!-- 以下音效為可選，如果檔案不存在會靜默失敗 -->
        <audio id="stageAdvanceSound" preload="auto"></audio>
        <audio id="speechDetectedSound" preload="auto"></audio>
        <audio id="drawSound" preload="auto"></audio>
        <canvas id="pipCanvas" width="640" height="360" class="hidden"></canvas>
