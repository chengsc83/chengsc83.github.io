<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f1" opacity="0.1"/>
  <circle cx="1100" cy="530" r="300" fill="#8b5cf6" opacity="0.08"/>
  
  <!-- Logo circle -->
  <circle cx="600" cy="200" r="80" fill="url(#accentGradient)"/>
  
  <!-- Clock icon inside logo -->
  <g transform="translate(600, 200)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ffffff" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="0" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="6" fill="#ffffff"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, Noto Sans TC, sans-serif" font-size="72" font-weight="800" fill="#ffffff">辯時計</text>
  
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, Noto Sans TC, sans-serif" font-size="36" font-weight="500" fill="url(#accentGradient)">專業、安全、現代化</text>
  
  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle" font-family="Inter, Noto Sans TC, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">為臺灣辯論而生</text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="580" width="400" height="4" rx="2" fill="url(#accentGradient)"/>
</svg>
